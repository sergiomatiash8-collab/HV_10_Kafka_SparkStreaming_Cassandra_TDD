services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  generator:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ..:/app
    command: python3 src/generator/generator.py
    restart: always
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  spark-processor:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ..:/app
    command: tail -f /dev/null
    restart: always
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy

  cassandra:
    image: cassandra:4.1
    container_name: deploy-cassandra-1
    ports:
      - "9042:9042"
    volumes:
      - ./init.cql:/opt/init.cql
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_DC=dc1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD-SHELL", "nodetool status"]
      interval: 10s
      timeout: 5s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init.cql:/opt/init.cql
    command: /bin/bash -c "cqlsh cassandra -f /opt/init.cql"